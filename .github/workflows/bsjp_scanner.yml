name: BSJP Scanner Sore (Upgrade)

on:
  schedule:
    - cron: '45 8 * * 1-5'   # 15:45 WIB (08:45 UTC) - Senin s/d Jumat
  workflow_dispatch:          # Tombol untuk menjalankan manual (tes)

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Library
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas-ta requests

      - name: Jalankan Bot BSJP
        run: python bsjp_bot.py
