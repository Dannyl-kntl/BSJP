name: Scan Sore BSJP

on:
  schedule:
    - cron: '30 8 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install semua library (gabung jadi satu)
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas-ta requests
      - name: Jalankan Bot
        run: python bsjp_bot.py
